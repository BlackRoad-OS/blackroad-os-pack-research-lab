name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: |
          ruff .
          yamllint experiments
      - name: Notebook lint
        run: |
          nbqa black --diff notebooks
          nbqa ruff notebooks
      - name: Tests
        run: |
          python -m compileall .
