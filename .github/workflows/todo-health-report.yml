             ❌ TODO-006: Set up Kubernetes cluster (deferred)
             ❌ TODO-021: Add E2E tests with Playwright (blocked)

          🌳 Decision Tree Propagation:
             └─ INFRA (w=0.25)     → 0.40 × 0.25 = 0.100
             └─ CODE (w=0.35)      → 0.55 × 0.35 = 0.193
             └─ DOCS (w=0.15)      → 0.53 × 0.15 = 0.080
